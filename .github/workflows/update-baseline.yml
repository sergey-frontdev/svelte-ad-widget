name: Update VRT baseline

on: workflow_dispatch

permissions:
    contents: write

jobs:
    update-baseline:
        name: Capture and commit baseline
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/puppeteer/puppeteer:25.0.4
            options: --user root --cap-add=SYS_ADMIN
        steps:
            - name: Install git
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends git
            - name: Checkout
              uses: actions/checkout@v4
            - name: Trust workspace
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
            - name: Install dependencies
              run: npm install
            - name: Capture screenshots
              run: npm run vrt:capture
            - name: Promote to baseline
              run: npm run vrt:approve
            - name: Commit updated baseline
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .reg/expected
                  git diff --staged --quiet || git commit -m "chore: update VRT baseline"
                  git push

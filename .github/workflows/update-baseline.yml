name: Update VRT baseline

on: workflow_dispatch

permissions:
    contents: write

jobs:
    update-baseline:
        name: Capture and commit baseline
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build VRT image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.vrt
                  tags: svelte-ad-widget-vrt:ci
                  load: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            # Capture and promote inside the same image CI uses for diffing, so
            # the baseline is produced in the identical environment.
            - name: Capture and promote baseline
              run: |
                  docker run --rm \
                    --user root --cap-add=SYS_ADMIN \
                    -v "$PWD:/work" -v /work/node_modules \
                    -w /work \
                    svelte-ad-widget-vrt:ci bash -lc "npm run vrt:capture && npm run vrt:approve"
            - name: Commit updated baseline
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .reg/expected
                  git diff --staged --quiet || git commit -m "chore: update VRT baseline"
                  git push

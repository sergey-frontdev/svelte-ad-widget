name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Linting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: npm
            - name: Install dependencies
              run: npm install
            - name: Svelte check
              run: npm run check

    build:
        name: Building
        needs: lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: npm
            - name: Install dependencies
              run: npm install
            - name: Build widgets
              run: npm run build
            - name: Build Storybook
              run: npm run build-sb

    screenshot:
        name: Screenshot tests
        needs: build
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/puppeteer/puppeteer:25.0.4
            options: --user root --cap-add=SYS_ADMIN
        steps:
            - name: Install git
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends git
            - name: Checkout
              uses: actions/checkout@v4
            - name: Trust workspace
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
            - name: Install dependencies
              run: npm install
            - name: Run visual regression
              run: npm run vrt
            - name: Upload VRT report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: vrt-report
                  path: .reg
                  if-no-files-found: error
